<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulaOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --bg-2:#0d1320;
    --panel:#111826;
    --panel-2:#161f30;
    --line:#1f2a3d;
    --line-2:#2a3a54;
    --txt:#c8d3e6;
    --txt-dim:#7587a3;
    --txt-faint:#4a5870;
    --cyan:#38e8d0;
    --cyan-dim:#1fa996;
    --amber:#f5a623;
    --magenta:#e85aad;
    --green:#4ade80;
    --red:#f06c75;
    --blue:#5aa9e8;
    --radius:10px;
    --shadow:0 18px 50px rgba(0,0,0,.55), 0 2px 8px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    background:var(--bg);
    color:var(--txt);
    user-select:none;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- BOOT ---------- */
  #boot{
    position:fixed;inset:0;z-index:9999;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;color:var(--cyan);
    transition:opacity .6s ease;
  }
  #boot .logo{font-size:64px;font-weight:600;letter-spacing:-2px;color:var(--txt);margin-bottom:6px}
  #boot .logo b{color:var(--cyan)}
  #boot .tag{color:var(--txt-faint);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
  #boot-log{width:460px;max-width:88vw;font-size:12.5px;line-height:1.7;color:var(--txt-dim);min-height:180px}
  #boot-log .ok{color:var(--green)}
  #boot-log .hl{color:var(--cyan)}
  #boot .bar{width:460px;max-width:88vw;height:3px;background:var(--line);margin-top:20px;border-radius:2px;overflow:hidden}
  #boot .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:width .2s}

  /* ---------- DESKTOP ---------- */
  #desktop{position:fixed;inset:0;display:flex;flex-direction:column;
    background:
      radial-gradient(1200px 700px at 78% -10%, rgba(56,232,208,.10), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(232,90,173,.08), transparent 55%),
      linear-gradient(180deg,#0a0e14,#070a10);
  }
  #stars{position:absolute;inset:0;pointer-events:none;opacity:.5}

  /* ---------- TOP BAR ---------- */
  #topbar{
    height:34px;flex:0 0 34px;display:flex;align-items:center;gap:4px;
    padding:0 10px;background:rgba(13,19,32,.72);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);z-index:500;position:relative;
    font-size:13px;
  }
  .tb-logo{display:flex;align-items:center;gap:8px;font-weight:700;padding:0 8px;cursor:default}
  .tb-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .tb-menu{padding:5px 10px;border-radius:6px;color:var(--txt-dim);cursor:pointer;font-weight:500}
  .tb-menu:hover{background:var(--panel-2);color:var(--txt)}
  .tb-spacer{flex:1}
  .tb-stat{display:flex;align-items:center;gap:14px;padding-right:6px;color:var(--txt-dim);font-family:'IBM Plex Mono',monospace;font-size:12px}
  .tb-stat .pill{display:flex;align-items:center;gap:6px}
  .tb-stat svg{width:14px;height:14px;stroke:var(--txt-dim);fill:none;stroke-width:1.7}
  #clock{color:var(--txt);min-width:74px;text-align:right}
  #datestr{color:var(--txt-faint)}

  /* dropdown */
  .dropdown{position:absolute;top:36px;background:var(--panel);border:1px solid var(--line-2);
    border-radius:8px;box-shadow:var(--shadow);padding:6px;min-width:200px;z-index:600;display:none}
  .dropdown.open{display:block;animation:pop .12s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .dd-item{padding:8px 10px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:20px;color:var(--txt)}
  .dd-item:hover{background:var(--panel-2)}
  .dd-item .k{color:var(--txt-faint);font-family:'IBM Plex Mono',monospace;font-size:11px}
  .dd-sep{height:1px;background:var(--line);margin:6px 4px}

  /* ---------- DESKTOP ICONS ---------- */
  #icons{position:absolute;top:48px;left:14px;display:flex;flex-direction:column;gap:4px;z-index:1}
  .dicon{width:84px;padding:10px 4px;border-radius:10px;display:flex;flex-direction:column;
    align-items:center;gap:7px;cursor:pointer;text-align:center}
  .dicon:hover{background:rgba(56,232,208,.07)}
  .dicon.sel{background:rgba(56,232,208,.14);outline:1px solid rgba(56,232,208,.3)}
  .dicon .gl{width:42px;height:42px}
  .dicon span{font-size:11.5px;color:var(--txt);text-shadow:0 1px 3px #000;line-height:1.25}

  /* ---------- WINDOWS ---------- */
  .win{position:absolute;min-width:340px;min-height:200px;background:var(--panel);
    border:1px solid var(--line-2);border-radius:var(--radius);box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;z-index:10}
  .win.focus{border-color:var(--cyan-dim);box-shadow:0 22px 60px rgba(0,0,0,.6),0 0 0 1px rgba(56,232,208,.25)}
  .titlebar{height:36px;flex:0 0 36px;display:flex;align-items:center;gap:8px;padding:0 10px;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));border-bottom:1px solid var(--line);cursor:grab}
  .titlebar.drag{cursor:grabbing}
  .traffic{display:flex;gap:7px;align-items:center}
  .tl{width:12px;height:12px;border-radius:50%;cursor:pointer;border:none;position:relative}
  .tl.c{background:#ff5f57}.tl.m{background:#febc2e}.tl.x{background:#28c840}
  .tl:hover{filter:brightness(1.15)}
  .tl svg{position:absolute;inset:0;margin:auto;width:8px;height:8px;opacity:0}
  .traffic:hover .tl svg{opacity:.55}
  .win-title{font-size:12.5px;font-weight:600;color:var(--txt-dim);flex:1;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;
    font-family:'IBM Plex Mono',monospace}
  .win-ico{width:16px;height:16px}
  .win-body{flex:1;overflow:auto;position:relative;background:var(--bg-2)}
  .resize{position:absolute;width:16px;height:16px;right:0;bottom:0;cursor:nwse-resize;z-index:5}

  /* ---------- TERMINAL ---------- */
  .term{height:100%;background:#070b12;color:#d7e2f2;font-family:'IBM Plex Mono',monospace;
    font-size:13px;line-height:1.55;padding:12px 14px;overflow-y:auto;cursor:text}
  .term .line{white-space:pre-wrap;word-break:break-word}
  .term .prompt-u{color:var(--cyan)}
  .term .prompt-h{color:var(--magenta)}
  .term .prompt-p{color:var(--blue)}
  .term .err{color:var(--red)}
  .term .ok{color:var(--green)}
  .term .dim{color:var(--txt-faint)}
  .term .dir{color:var(--cyan);font-weight:500}
  .term .exe{color:var(--green)}
  .term .amber{color:var(--amber)}
  .term-input-line{display:flex;align-items:baseline;gap:0}
  .term-input{flex:1;background:transparent;border:none;outline:none;color:#d7e2f2;
    font-family:inherit;font-size:inherit;caret-color:var(--cyan)}
  .ascii{color:var(--cyan);line-height:1.15}

  /* ---------- FILE MANAGER ---------- */
  .fm{display:flex;height:100%;font-size:13px}
  .fm-side{width:160px;flex:0 0 160px;background:var(--panel);border-right:1px solid var(--line);padding:10px 8px;overflow:auto}
  .fm-side .grp{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt-faint);padding:8px 8px 4px}
  .fm-place{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;color:var(--txt-dim)}
  .fm-place:hover{background:var(--panel-2);color:var(--txt)}
  .fm-place.active{background:rgba(56,232,208,.12);color:var(--cyan)}
  .fm-place svg{width:16px;height:16px}
  .fm-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .fm-bar{height:40px;flex:0 0 40px;display:flex;align-items:center;gap:6px;padding:0 10px;border-bottom:1px solid var(--line);background:var(--panel)}
  .fm-nav{width:28px;height:28px;border-radius:6px;border:1px solid var(--line-2);background:var(--panel-2);
    color:var(--txt-dim);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .fm-nav:hover{color:var(--txt);border-color:var(--cyan-dim)}
  .fm-nav:disabled{opacity:.35;cursor:default}
  .fm-path{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:5px 10px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--cyan);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-grid{flex:1;overflow:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,86px);
    grid-auto-rows:90px;gap:6px;align-content:start}
  .fm-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;border-radius:8px;
    cursor:pointer;text-align:center}
  .fm-item:hover{background:var(--panel-2)}
  .fm-item.sel{background:rgba(56,232,208,.14);outline:1px solid rgba(56,232,208,.3)}
  .fm-item .gl{width:38px;height:38px}
  .fm-item span{font-size:11px;color:var(--txt);word-break:break-word;line-height:1.2;max-height:28px;overflow:hidden}
  .fm-empty{grid-column:1/-1;color:var(--txt-faint);text-align:center;padding:50px;font-size:13px}
  .fm-foot{height:26px;flex:0 0 26px;border-top:1px solid var(--line);display:flex;align-items:center;
    padding:0 12px;font-size:11px;color:var(--txt-faint);font-family:'IBM Plex Mono',monospace;background:var(--panel)}

  /* ---------- TEXT EDITOR ---------- */
  .ed{display:flex;flex-direction:column;height:100%}
  .ed-bar{height:34px;flex:0 0 34px;display:flex;align-items:center;gap:8px;padding:0 10px;
    border-bottom:1px solid var(--line);background:var(--panel);font-size:12px}
  .ed-fname{color:var(--cyan);font-family:'IBM Plex Mono',monospace}
  .ed-btn{margin-left:auto;background:var(--cyan-dim);color:#021a16;border:none;padding:5px 14px;
    border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;font-family:'IBM Plex Sans'}
  .ed-btn:hover{background:var(--cyan)}
  .ed-area{flex:1;background:#070b12;color:#d7e2f2;border:none;outline:none;resize:none;
    font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.6;padding:14px;width:100%}
  .ed-status{height:24px;flex:0 0 24px;border-top:1px solid var(--line);display:flex;align-items:center;
    padding:0 12px;gap:16px;font-size:11px;color:var(--txt-faint);font-family:'IBM Plex Mono',monospace;background:var(--panel)}

  /* ---------- SETTINGS / ABOUT ---------- */
  .pane{padding:22px 26px;font-size:13.5px;line-height:1.7;color:var(--txt);overflow:auto;height:100%}
  .pane h2{font-size:18px;margin-bottom:4px;color:#fff}
  .pane .sub{color:var(--txt-dim);margin-bottom:20px;font-size:13px}
  .pane h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin:22px 0 10px}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)}
  .kv span:first-child{color:var(--txt-dim)}
  .kv span:last-child{font-family:'IBM Plex Mono',monospace;color:var(--txt)}
  .swatches{display:flex;gap:10px;margin-top:6px}
  .sw{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
  .sw:hover{transform:scale(1.12)}
  .sw.on{border-color:#fff}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .switch{width:42px;height:24px;border-radius:12px;background:var(--line-2);position:relative;cursor:pointer;transition:background .2s;flex:0 0 42px}
  .switch.on{background:var(--cyan-dim)}
  .switch i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
  .switch.on i{left:21px}

  /* ---------- CALCULATOR ---------- */
  .calc{display:flex;flex-direction:column;height:100%;background:var(--bg-2);padding:12px;gap:10px}
  .calc-disp{background:#070b12;border:1px solid var(--line);border-radius:10px;padding:18px 16px;text-align:right;
    font-family:'IBM Plex Mono',monospace;flex:0 0 auto}
  .calc-disp .small{color:var(--txt-faint);font-size:13px;min-height:18px;overflow:hidden}
  .calc-disp .big{color:#fff;font-size:34px;font-weight:500;overflow:hidden;white-space:nowrap}
  .calc-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .calc-grid button{border:none;border-radius:9px;font-size:18px;font-family:'IBM Plex Mono',monospace;
    cursor:pointer;background:var(--panel-2);color:var(--txt);transition:filter .1s}
  .calc-grid button:hover{filter:brightness(1.25)}
  .calc-grid button:active{filter:brightness(.85)}
  .calc-grid .op{background:#1a2740;color:var(--cyan)}
  .calc-grid .eq{background:var(--cyan-dim);color:#021a16;font-weight:700}
  .calc-grid .fn{background:#161f30;color:var(--txt-dim);font-size:15px}

  /* ---------- DOCK ---------- */
  #dock{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:400;
    display:flex;align-items:flex-end;gap:8px;padding:8px 12px;background:rgba(17,24,38,.7);
    backdrop-filter:blur(18px);border:1px solid var(--line-2);border-radius:18px;box-shadow:var(--shadow)}
  .dock-app{width:46px;height:46px;border-radius:13px;cursor:pointer;position:relative;
    display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
  .dock-app:hover{transform:translateY(-10px) scale(1.12)}
  .dock-app .gl{width:30px;height:30px}
  .dock-app .run{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:4px;height:4px;
    border-radius:50%;background:var(--cyan);opacity:0;box-shadow:0 0 6px var(--cyan)}
  .dock-app.running .run{opacity:1}
  .dock-app .tip{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);background:var(--panel);
    border:1px solid var(--line-2);padding:4px 10px;border-radius:6px;font-size:11.5px;white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .12s;color:var(--txt)}
  .dock-app:hover .tip{opacity:1}
  .dock-sep{width:1px;height:36px;background:var(--line-2);margin:0 2px;align-self:center}

  /* context menu */
  #ctx{position:fixed;z-index:800;background:var(--panel);border:1px solid var(--line-2);border-radius:8px;
    box-shadow:var(--shadow);padding:5px;min-width:160px;display:none;font-size:13px}
  #ctx.open{display:block;animation:pop .1s ease}
  .ctx-i{padding:8px 11px;border-radius:6px;cursor:pointer;color:var(--txt);display:flex;align-items:center;gap:9px}
  .ctx-i:hover{background:var(--panel-2)}
  .ctx-i.danger:hover{background:rgba(240,108,117,.18);color:var(--red)}
  .ctx-i svg{width:15px;height:15px;opacity:.7}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:#36486a;background-clip:padding-box}

  .focus-trap:focus{outline:2px solid var(--cyan);outline-offset:-2px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot">
  <div class="logo">Nebula<b>OS</b></div>
  <div class="tag">a linux distribution for the browser</div>
  <div id="boot-log"></div>
  <div class="bar"><i id="boot-bar"></i></div>
</div>

<!-- DESKTOP -->
<div id="desktop" style="display:none">
  <canvas id="stars"></canvas>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-logo"><span class="dot"></span>NebulaOS</div>
    <div class="tb-menu" data-menu="system">System</div>
    <div class="tb-menu" data-menu="apps">Apps</div>
    <div class="tb-menu" data-menu="help">Help</div>
    <div class="tb-spacer"></div>
    <div class="tb-stat">
      <span class="pill" title="CPU"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg><span id="cpu">3%</span></span>
      <span class="pill" title="Memory"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="10" rx="1"/><path d="M7 7v10M11 7v10M15 7v10"/></svg><span id="mem">412M</span></span>
      <span class="pill" title="Network"><svg viewBox="0 0 24 24"><path d="M5 12.5a10 10 0 0114 0M8 16a5 5 0 018 0"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg></span>
      <span id="clock">--:--:--</span>
      <span id="datestr">---</span>
    </div>
  </div>

  <!-- dropdowns -->
  <div class="dropdown" id="dd-system">
    <div class="dd-item" data-act="open:settings">Settings</div>
    <div class="dd-item" data-act="open:files">File Manager</div>
    <div class="dd-item" data-act="open:monitor">System Monitor</div>
    <div class="dd-sep"></div>
    <div class="dd-item" data-act="about">About NebulaOS</div>
    <div class="dd-item" data-act="reboot">Reboot <span class="k">⌃R</span></div>
  </div>
  <div class="dropdown" id="dd-apps">
    <div class="dd-item" data-act="open:terminal">Terminal <span class="k">⌃T</span></div>
    <div class="dd-item" data-act="open:files">Files</div>
    <div class="dd-item" data-act="open:editor">Text Editor</div>
    <div class="dd-item" data-act="open:calc">Calculator</div>
    <div class="dd-item" data-act="open:browser">Web Browser</div>
    <div class="dd-item" data-act="open:settings">Settings</div>
  </div>
  <div class="dropdown" id="dd-help">
    <div class="dd-item" data-act="open:terminal">Open Terminal</div>
    <div class="dd-item" data-act="helptext">Type <span class="k">help</span> in terminal</div>
    <div class="dd-sep"></div>
    <div class="dd-item" data-act="about">About</div>
  </div>

  <!-- desktop icons -->
  <div id="icons"></div>

  <!-- dock -->
  <div id="dock"></div>
</div>

<!-- context menu -->
<div id="ctx"></div>

<script>
/* =====================================================================
   NebulaOS — single-file browser Linux desktop
   ===================================================================== */

/* ---------- Virtual Filesystem ---------- */
const FS = {
  '/': { type:'dir', children:['home','etc','bin','usr','var','tmp'] },
  '/home': { type:'dir', children:['nebula'] },
  '/home/nebula': { type:'dir', children:['Documents','Downloads','Projects','.config','readme.txt','welcome.sh'] },
  '/home/nebula/Documents': { type:'dir', children:['notes.txt','todo.md'] },
  '/home/nebula/Documents/notes.txt': { type:'file', content:'NebulaOS field notes\n====================\n\n- The terminal and File Manager share ONE filesystem.\n- Create a file in the terminal, refresh Files, and it appears.\n- Double-click any .txt or .md to edit it.\n\nTry:  echo "hello" > hello.txt   then open Files.\n' },
  '/home/nebula/Documents/todo.md': { type:'file', content:'# To-do\n\n- [x] Boot the system\n- [x] Open a terminal\n- [ ] Build something\n- [ ] Star the repo (it is imaginary, but still)\n' },
  '/home/nebula/Downloads': { type:'dir', children:[] },
  '/home/nebula/Projects': { type:'dir', children:['nebula-kernel','hello.c'] },
  '/home/nebula/Projects/nebula-kernel': { type:'dir', children:['main.rs'] },
  '/home/nebula/Projects/nebula-kernel/main.rs': { type:'file', content:'fn main() {\n    println!("Booting NebulaOS kernel...");\n    let modules = ["scheduler", "vfs", "net", "tty"];\n    for m in modules {\n        println!("  [ok] loaded {}", m);\n    }\n}\n' },
  '/home/nebula/Projects/hello.c': { type:'file', content:'#include <stdio.h>\n\nint main(void) {\n    printf("Hello from NebulaOS\\n");\n    return 0;\n}\n' },
  '/home/nebula/.config': { type:'dir', children:['nebula.conf'] },
  '/home/nebula/.config/nebula.conf': { type:'file', content:'[appearance]\naccent = cyan\ntheme = deep-space\n\n[shell]\nprompt = nebula\nhistory = 1000\n' },
  '/home/nebula/readme.txt': { type:'file', content:'Welcome to NebulaOS.\n\nThis is a complete desktop environment running entirely in your browser\n— no server, no install. Everything you see is one HTML file.\n\nThe terminal is real: it has a working shell with cd, ls, cat, mkdir,\ntouch, rm, mv, cp, echo, grep, tree, neofetch and more. The files it\noperates on are the SAME files the graphical File Manager shows.\n\nDouble-click apps in the dock to begin.\n' },
  '/home/nebula/welcome.sh': { type:'file', content:'#!/bin/sh\necho "Welcome, $(whoami)!"\necho "You are running NebulaOS on $(uname)."\nneofetch\n' },
  '/etc': { type:'dir', children:['hostname','os-release','motd'] },
  '/etc/hostname': { type:'file', content:'nebula\n' },
  '/etc/os-release': { type:'file', content:'NAME="NebulaOS"\nVERSION="1.0 (Stellar)"\nID=nebula\nPRETTY_NAME="NebulaOS 1.0 Stellar"\nHOME_URL="https://nebula.os"\n' },
  '/etc/motd': { type:'file', content:'  The cosmos is within us. We are made of star-stuff.\n' },
  '/bin': { type:'dir', children:['sh','ls','cat','nebula'] },
  '/bin/sh': { type:'file', content:'(binary)', exe:true },
  '/bin/ls': { type:'file', content:'(binary)', exe:true },
  '/bin/cat': { type:'file', content:'(binary)', exe:true },
  '/bin/nebula': { type:'file', content:'(binary)', exe:true },
  '/usr': { type:'dir', children:['share','local'] },
  '/usr/share': { type:'dir', children:[] },
  '/usr/local': { type:'dir', children:[] },
  '/var': { type:'dir', children:['log'] },
  '/var/log': { type:'dir', children:['system.log'] },
  '/var/log/system.log': { type:'file', content:'[boot] kernel started\n[boot] mounted /\n[boot] tty0 ready\n[ok] desktop session active\n' },
  '/tmp': { type:'dir', children:[] },
};

/* FS helpers */
function normalize(path){
  if(!path) return '/';
  const parts = path.split('/');
  const stack = [];
  for(const p of parts){
    if(p===''||p==='.') continue;
    if(p==='..'){ stack.pop(); }
    else stack.push(p);
  }
  return '/'+stack.join('/');
}
function resolve(cwd, arg){
  if(!arg) return cwd;
  if(arg==='~'||arg.startsWith('~/')) arg = '/home/nebula'+arg.slice(1);
  if(arg.startsWith('/')) return normalize(arg);
  return normalize(cwd+'/'+arg);
}
function exists(p){ return FS[p]!==undefined; }
function isDir(p){ return FS[p]&&FS[p].type==='dir'; }
function parentOf(p){ if(p==='/')return '/'; const i=p.lastIndexOf('/'); return i===0?'/':p.slice(0,i); }
function baseOf(p){ if(p==='/')return '/'; return p.slice(p.lastIndexOf('/')+1); }
function listDir(p){ if(!isDir(p))return []; return FS[p].children.slice().sort((a,b)=>{
  const da=isDir(p+(p==='/'?'':'/')+a), db=isDir(p+(p==='/'?'':'/')+b);
  if(da!==db) return da?-1:1; return a.localeCompare(b);
}); }
function childPath(dir,name){ return dir==='/'?'/'+name:dir+'/'+name; }
function addChild(dir,name){ if(!FS[dir].children.includes(name)) FS[dir].children.push(name); }
function removeChild(dir,name){ FS[dir].children = FS[dir].children.filter(c=>c!==name); }
function deleteRec(p){
  if(isDir(p)){ for(const c of FS[p].children.slice()) deleteRec(childPath(p,c)); }
  delete FS[p];
}
function uniqueName(dir,base,ext){
  let n=base+ext, i=1;
  while(exists(childPath(dir,n))){ n=base+'-'+i+ext; i++; }
  return n;
}

function iconFor(path){
  if(isDir(path)) return ICON.folder;
  const n = baseOf(path);
  if(FS[path] && FS[path].exe) return ICON.exe;
  if(n.endsWith('.c')||n.endsWith('.rs')||n.endsWith('.js')||n.endsWith('.py')||n.endsWith('.sh')) return ICON.code;
  return ICON.file;
}

/* ===================================================================
   Window Manager
   =================================================================== */
let zTop = 10, focusWin = null;
const windows = {}; // id -> {el, app}
let winSeq = 0;

function makeWindow({title, icon, w=560, h=400, x, y, body, app, onClose}){
  const id = 'win-'+(winSeq++);
  const desk = document.getElementById('desktop');
  const el = document.createElement('div');
  el.className='win'; el.id=id;
  el.style.width=w+'px'; el.style.height=h+'px';
  const offset = (Object.keys(windows).length%6)*26;
  el.style.left = (x ?? (90+offset))+'px';
  el.style.top  = (y ?? (60+offset))+'px';
  el.style.zIndex = ++zTop;

  el.innerHTML = `
    <div class="titlebar">
      <div class="traffic">
        <button class="tl c" title="Close"><svg viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="#600" stroke-width="1.4"/></svg></button>
        <button class="tl m" title="Minimize"><svg viewBox="0 0 8 8"><path d="M1 4h6" stroke="#640" stroke-width="1.4"/></svg></button>
        <button class="tl x" title="Maximize"><svg viewBox="0 0 8 8"><path d="M1.5 1.5h5v5h-5z" stroke="#060" stroke-width="1.2" fill="none"/></svg></button>
      </div>
      <div class="win-ico">${icon||''}</div>
      <div class="win-title">${title}</div>
      <div style="width:54px"></div>
    </div>
    <div class="win-body"></div>
    <div class="resize"></div>`;
  el.querySelector('.win-body').appendChild(body);
  desk.appendChild(el);
  windows[id] = {el, app};

  // focus
  const focus = ()=>{
    if(focusWin && windows[focusWin]) windows[focusWin].el.classList.remove('focus');
    el.style.zIndex = ++zTop; el.classList.add('focus'); focusWin=id;
    updateDock();
  };
  el.addEventListener('mousedown', focus);
  focus();

  // window controls
  el.querySelector('.tl.c').addEventListener('click',(e)=>{e.stopPropagation(); closeWindow(id, onClose);});
  el.querySelector('.tl.m').addEventListener('click',(e)=>{e.stopPropagation(); el.style.display='none';});
  let maxed=false, prev={};
  el.querySelector('.tl.x').addEventListener('click',(e)=>{
    e.stopPropagation();
    if(!maxed){ prev={l:el.style.left,t:el.style.top,w:el.style.width,h:el.style.height};
      el.style.left='6px'; el.style.top='40px'; el.style.width='calc(100vw - 12px)'; el.style.height='calc(100vh - 120px)'; maxed=true;
    } else { Object.assign(el.style,{left:prev.l,top:prev.t,width:prev.w,height:prev.h}); maxed=false; }
  });

  // drag
  const tb = el.querySelector('.titlebar');
  tb.addEventListener('mousedown',(e)=>{
    if(e.target.closest('.traffic')) return;
    focus(); tb.classList.add('drag');
    const sx=e.clientX, sy=e.clientY, ol=el.offsetLeft, ot=el.offsetTop;
    const mv=(ev)=>{ el.style.left=Math.max(0,ol+ev.clientX-sx)+'px'; el.style.top=Math.max(34,ot+ev.clientY-sy)+'px'; };
    const up=()=>{ tb.classList.remove('drag'); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
  // double-click title to maximize
  tb.addEventListener('dblclick',(e)=>{ if(!e.target.closest('.traffic')) el.querySelector('.tl.x').click(); });

  // resize
  const rz = el.querySelector('.resize');
  rz.addEventListener('mousedown',(e)=>{
    e.stopPropagation(); focus();
    const sx=e.clientX, sy=e.clientY, ow=el.offsetWidth, oh=el.offsetHeight;
    const mv=(ev)=>{ el.style.width=Math.max(340,ow+ev.clientX-sx)+'px'; el.style.height=Math.max(200,oh+ev.clientY-sy)+'px'; };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });

  updateDock();
  return {id, el, focus};
}
function closeWindow(id, onClose){
  if(windows[id]){ if(onClose)onClose(); windows[id].el.remove(); delete windows[id]; }
  if(focusWin===id) focusWin=null;
  updateDock();
}
function appWindowOpen(app){ return Object.values(windows).some(w=>w.app===app); }
function focusApp(app){
  const w = Object.values(windows).find(x=>x.app===app);
  if(w){ w.el.style.display='flex'; w.el.style.zIndex=++zTop;
    if(focusWin&&windows[focusWin])windows[focusWin].el.classList.remove('focus');
    w.el.classList.add('focus'); focusWin=Object.keys(windows).find(k=>windows[k]===w);
    return true; }
  return false;
}

/* ===================================================================
   Terminal
   =================================================================== */
function openTerminal(startCwd='/home/nebula'){
  const wrap = document.createElement('div');
  wrap.className='term';
  const win = makeWindow({title:'nebula@terminal: ~', icon:ICON.terminal, w:640, h:420, body:wrap, app:'terminal'});

  let cwd = startCwd;
  const history=[]; let hIdx=0;
  const promptStr = ()=>`<span class="prompt-u">nebula</span><span class="dim">@</span><span class="prompt-h">nebula</span><span class="dim">:</span><span class="prompt-p">${cwd==='/home/nebula'?'~':cwd.replace('/home/nebula','~')}</span><span class="dim">$</span> `;

  function print(html, cls){
    const d=document.createElement('div'); d.className='line'+(cls?' '+cls:''); d.innerHTML=html; wrap.appendChild(d);
    wrap.scrollTop=wrap.scrollHeight;
  }
  let suppressPrompt=false;
  let activeInput=null;
  function newInput(){
    const line=document.createElement('div'); line.className='term-input-line';
    line.innerHTML=`<span>${promptStr()}</span>`;
    const inp=document.createElement('input'); inp.className='term-input'; inp.spellcheck=false; inp.autocapitalize='off'; inp.autocomplete='off';
    line.appendChild(inp); wrap.appendChild(line); wrap.scrollTop=wrap.scrollHeight;
    activeInput=inp;
    inp.focus();
    requestAnimationFrame(()=>{ if(activeInput===inp && !inp.disabled) inp.focus(); });

    inp.addEventListener('keydown',(e)=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const cmd=inp.value; inp.disabled=true;
        // freeze line as text
        line.innerHTML=`<span>${promptStr()}</span><span>${escapeHtml(cmd)}</span>`;
        if(cmd.trim()){ history.push(cmd); hIdx=history.length; }
        try {
          run(cmd);
        } catch(err) {
          print(`<span class="err">nsh: internal error: ${escapeHtml(err && err.message ? err.message : String(err))}</span>`);
          suppressPrompt=false;
        }
        if(!suppressPrompt) newInput();
        suppressPrompt=false;
      } else if(e.key==='ArrowUp'){ e.preventDefault(); if(hIdx>0){hIdx--; inp.value=history[hIdx]||'';} }
      else if(e.key==='ArrowDown'){ e.preventDefault(); if(hIdx<history.length-1){hIdx++; inp.value=history[hIdx]||'';} else {hIdx=history.length; inp.value='';} }
      else if(e.key==='Tab'){ e.preventDefault(); tabComplete(inp); }
      else if(e.key==='l'&&e.ctrlKey){ e.preventDefault(); clearTerm(); }
      else if(e.key==='c'&&e.ctrlKey){ e.preventDefault(); print(`<span>${promptStr()}</span>${escapeHtml(inp.value)}^C`); inp.disabled=true; newInput(); }
    });
  }
  function clearTerm(){ wrap.innerHTML=''; }
  wrap.addEventListener('click',()=>{ if(activeInput && !activeInput.disabled) activeInput.focus(); });
  wrap.addEventListener('mousedown',()=>{ if(activeInput && !activeInput.disabled) setTimeout(()=>activeInput.focus(),0); });

  function tabComplete(inp){
    const val=inp.value; const parts=val.split(' ');
    const frag=parts[parts.length-1];
    const slash=frag.lastIndexOf('/');
    const dir = slash>=0 ? resolve(cwd, frag.slice(0,slash+1)) : cwd;
    const stub = slash>=0 ? frag.slice(slash+1) : frag;
    if(!isDir(dir)) return;
    const matches = FS[dir].children.filter(c=>c.startsWith(stub));
    if(matches.length===1){
      const full = (slash>=0?frag.slice(0,slash+1):'')+matches[0]+(isDir(childPath(dir,matches[0]))?'/':'');
      parts[parts.length-1]=full; inp.value=parts.join(' ');
    } else if(matches.length>1){
      print(`<span>${promptStr()}</span>${escapeHtml(val)}`);
      print(matches.map(m=>isDir(childPath(dir,m))?`<span class="dir">${m}/</span>`:m).join('  '));
    }
  }

  /* ---- command runner ---- */
  function run(raw){
    const line = raw.trim();
    if(!line) return;
    // support a > b  and  a >> b  redirection (very light)
    let redirect=null, appendMode=false, cmdline=line;
    const rr = line.match(/^(.*?)(>>|>)\s*(\S+)\s*$/);
    if(rr){ cmdline=rr[1].trim(); appendMode=rr[2]==='>>'; redirect=resolve(cwd,rr[3]); }

    const args = tokenize(cmdline);
    const cmd = args.shift();
    let out = '';
    const emit=(t)=>{ out += (out?'\n':'')+t; };

    switch(cmd){
      case 'help': printHelp(); return;
      case 'clear': clearTerm(); suppressPrompt=true; newInput(); return;
      case 'pwd': emit(cwd); break;
      case 'whoami': emit('nebula'); break;
      case 'hostname': emit('nebula'); break;
      case 'uname': emit(args.includes('-a')?'NebulaOS 1.0 Stellar nebula web x86_64 GNU/Browser':'NebulaOS'); break;
      case 'date': emit(new Date().toString()); break;
      case 'echo': emit(args.join(' ').replace(/^["']|["']$/g,'').replace(/\$\(whoami\)/g,'nebula').replace(/\$\(uname\)/g,'NebulaOS').replace(/\$USER/g,'nebula')); break;
      case 'ls': out = cmd_ls(args); break;
      case 'cd': { const r=cmd_cd(args[0]); if(r){emit(r);} win.el.querySelector('.win-title').textContent=`nebula@terminal: ${cwd==='/home/nebula'?'~':cwd.replace('/home/nebula','~')}`; break; }
      case 'cat': out = cmd_cat(args); break;
      case 'mkdir': out = cmd_mkdir(args); break;
      case 'touch': out = cmd_touch(args); break;
      case 'rm': out = cmd_rm(args); break;
      case 'rmdir': out = cmd_rm(['-r',...args]); break;
      case 'cp': out = cmd_cp(args); break;
      case 'mv': out = cmd_mv(args); break;
      case 'tree': out = cmd_tree(args[0]?resolve(cwd,args[0]):cwd); break;
      case 'grep': out = cmd_grep(args); break;
      case 'wc': out = cmd_wc(args); break;
      case 'head': out = cmd_headtail(args,'head'); break;
      case 'tail': out = cmd_headtail(args,'tail'); break;
      case 'find': out = cmd_find(args); break;
      case 'open': out = cmd_open(args); break;
      case 'edit': case 'nano': case 'vi': out = cmd_open(args, true); break;
      case 'neofetch': case 'fetch': printNeofetch(); return;
      case 'history': emit(history.map((h,i)=>`${String(i+1).padStart(4)}  ${h}`).join('\n')); break;
      case 'cowsay': emit(cowsay(args.join(' ')||'Moo from NebulaOS')); break;
      case 'figlet': case 'banner': emit(banner(args.join(' ')||'NEBULA')); break;
      case 'sl': emit('🚂💨  woo woo!  (you typed sl instead of ls)'); break;
      case 'sudo': emit(args.length?`nebula is not in the sudoers file. This incident will be reported.`:'usage: sudo <command>'); break;
      case 'man': emit(args[0]?`No manual entry for ${args[0]} — but try: help`:'What manual page do you want?'); break;
      case 'reboot': print('<span class="amber">Rebooting NebulaOS...</span>'); setTimeout(reboot,700); suppressPrompt=true; return;
      case 'exit': closeWindow(win.id); return;
      case 'about': emit('NebulaOS 1.0 "Stellar" — a Linux desktop that lives in your browser.\nOne HTML file. No server. The terminal and File Manager share one filesystem.'); break;
      case 'ps': emit('  PID TTY          TIME CMD\n    1 ?        00:00:01 init\n   42 tty0     00:00:00 nebula-shell\n  108 tty0     00:00:00 '+cmd); break;
      case 'df': emit('Filesystem     Size  Used Avail Use% Mounted on\nnebula-vfs     ∞     12K   ∞     0%  /'); break;
      case 'free': emit('               total        used        free\nMem:         8388608      421888     7966720\nSwap:              0           0           0'); break;
      case 'calc': case 'bc': { const expr=args.join(' '); try{ emit(String(safeEval(expr))); }catch{ emit('bc: parse error'); } break; }
      case '': break;
      default:
        out = `<span class="err">nebula: command not found: ${escapeHtml(cmd)}</span>  <span class="dim">(try 'help')</span>`;
    }

    if(redirect && out!==undefined){
      const plain = stripTags(out);
      writeFileTo(redirect, plain, appendMode);
      refreshFileManagers();
    } else if(out){
      print(out);
    }
  }

  /* ---- command implementations ---- */
  function cmd_cd(arg){
    if(!arg||arg==='~') { cwd='/home/nebula'; return; }
    const t=resolve(cwd,arg);
    if(!exists(t)) return `<span class="err">cd: no such file or directory: ${escapeHtml(arg)}</span>`;
    if(!isDir(t)) return `<span class="err">cd: not a directory: ${escapeHtml(arg)}</span>`;
    cwd=t;
  }
  function cmd_ls(args){
    const long = args.includes('-l')||args.includes('-la')||args.includes('-al');
    const all = args.includes('-a')||args.includes('-la')||args.includes('-al');
    const target = args.filter(a=>!a.startsWith('-'))[0];
    const dir = target?resolve(cwd,target):cwd;
    if(!exists(dir)) return `<span class="err">ls: cannot access '${escapeHtml(target)}': No such file or directory</span>`;
    if(!isDir(dir)){ return baseOf(dir); }
    let items = FS[dir].children.slice();
    if(!all) items=items.filter(c=>!c.startsWith('.'));
    items.sort();
    if(items.length===0) return '';
    if(long){
      return items.map(c=>{
        const p=childPath(dir,c); const d=isDir(p);
        const perm=d?'drwxr-xr-x':(FS[p].exe?'-rwxr-xr-x':'-rw-r--r--');
        const size=d?4096:(FS[p].content?FS[p].content.length:0);
        const nm=d?`<span class="dir">${c}</span>`:(FS[p].exe?`<span class="exe">${c}</span>`:c);
        return `${perm}  nebula  nebula  ${String(size).padStart(6)}  ${nm}`;
      }).join('\n');
    }
    return items.map(c=>{
      const p=childPath(dir,c);
      if(isDir(p)) return `<span class="dir">${c}/</span>`;
      if(FS[p].exe) return `<span class="exe">${c}</span>`;
      return c;
    }).join('   ');
  }
  function cmd_cat(args){
    const files=args.filter(a=>!a.startsWith('-'));
    if(!files.length) return `<span class="err">cat: missing operand</span>`;
    return files.map(f=>{
      const p=resolve(cwd,f);
      if(!exists(p)) return `<span class="err">cat: ${escapeHtml(f)}: No such file or directory</span>`;
      if(isDir(p)) return `<span class="err">cat: ${escapeHtml(f)}: Is a directory</span>`;
      return escapeHtml(FS[p].content||'');
    }).join('\n');
  }
  function cmd_mkdir(args){
    const names=args.filter(a=>!a.startsWith('-'));
    if(!names.length) return `<span class="err">mkdir: missing operand</span>`;
    let err='';
    for(const n of names){
      const p=resolve(cwd,n); const par=parentOf(p);
      if(exists(p)){ err+=`<span class="err">mkdir: cannot create directory '${escapeHtml(n)}': File exists</span>\n`; continue; }
      if(!isDir(par)){ err+=`<span class="err">mkdir: cannot create directory '${escapeHtml(n)}': No such file or directory</span>\n`; continue; }
      FS[p]={type:'dir',children:[]}; addChild(par,baseOf(p));
    }
    refreshFileManagers();
    return err.trim();
  }
  function cmd_touch(args){
    const names=args.filter(a=>!a.startsWith('-'));
    if(!names.length) return `<span class="err">touch: missing file operand</span>`;
    for(const n of names){
      const p=resolve(cwd,n); const par=parentOf(p);
      if(!isDir(par)){ return `<span class="err">touch: cannot touch '${escapeHtml(n)}': No such file or directory</span>`; }
      if(!exists(p)){ FS[p]={type:'file',content:''}; addChild(par,baseOf(p)); }
    }
    refreshFileManagers();
    return '';
  }
  function cmd_rm(args){
    const rec=args.includes('-r')||args.includes('-rf')||args.includes('-fr')||args.includes('-R');
    const names=args.filter(a=>!a.startsWith('-'));
    if(!names.length) return `<span class="err">rm: missing operand</span>`;
    let err='';
    for(const n of names){
      const p=resolve(cwd,n);
      if(!exists(p)){ err+=`<span class="err">rm: cannot remove '${escapeHtml(n)}': No such file or directory</span>\n`; continue; }
      if(p==='/'||p==='/home'||p==='/home/nebula'){ err+=`<span class="err">rm: refusing to remove '${escapeHtml(n)}'</span>\n`; continue; }
      if(isDir(p)&&!rec){ err+=`<span class="err">rm: cannot remove '${escapeHtml(n)}': Is a directory</span>\n`; continue; }
      deleteRec(p); removeChild(parentOf(p),baseOf(p));
    }
    refreshFileManagers();
    return err.trim();
  }
  function cmd_cp(args){
    const a=args.filter(x=>!x.startsWith('-'));
    if(a.length<2) return `<span class="err">cp: missing destination</span>`;
    const src=resolve(cwd,a[0]); let dst=resolve(cwd,a[1]);
    if(!exists(src)) return `<span class="err">cp: cannot stat '${escapeHtml(a[0])}': No such file or directory</span>`;
    if(isDir(src)) return `<span class="err">cp: -r not supported for '${escapeHtml(a[0])}' here</span>`;
    if(isDir(dst)) dst=childPath(dst,baseOf(src));
    FS[dst]={type:'file',content:FS[src].content}; addChild(parentOf(dst),baseOf(dst));
    refreshFileManagers(); return '';
  }
  function cmd_mv(args){
    const a=args.filter(x=>!x.startsWith('-'));
    if(a.length<2) return `<span class="err">mv: missing destination</span>`;
    const src=resolve(cwd,a[0]); let dst=resolve(cwd,a[1]);
    if(!exists(src)) return `<span class="err">mv: cannot stat '${escapeHtml(a[0])}': No such file or directory</span>`;
    if(isDir(dst)) dst=childPath(dst,baseOf(src));
    FS[dst]=FS[src]; if(isDir(src)){ /* re-key children */ rekey(src,dst); }
    delete FS[src]; removeChild(parentOf(src),baseOf(src)); addChild(parentOf(dst),baseOf(dst));
    refreshFileManagers(); return '';
  }
  function rekey(oldP,newP){
    if(!isDir(newP)) return;
    for(const c of FS[newP].children){
      const o=childPath(oldP,c), n=childPath(newP,c);
      FS[n]=FS[o]; delete FS[o]; if(isDir(n)) rekey(o,n);
    }
  }
  function cmd_tree(root,prefix='',isLast=true,acc={s:''},depth=0){
    if(depth===0){ acc.s = `<span class="dir">${root==='/home/nebula'?'~':root}</span>\n`; }
    if(!isDir(root)) return acc.s;
    const ch=listDir(root);
    ch.forEach((c,i)=>{
      const last=i===ch.length-1;
      const p=childPath(root,c);
      const branch=last?'└── ':'├── ';
      const nm=isDir(p)?`<span class="dir">${c}</span>`:c;
      acc.s+=prefix+branch+nm+'\n';
      if(isDir(p)) cmd_tree(p, prefix+(last?'    ':'│   '), last, acc, depth+1);
    });
    return acc.s.replace(/\n$/,'');
  }
  function cmd_grep(args){
    const flags=args.filter(a=>a.startsWith('-'));
    const a=args.filter(x=>!x.startsWith('-'));
    const ic=flags.includes('-i');
    if(a.length<2) return `<span class="err">usage: grep [-i] PATTERN FILE</span>`;
    const pat=a[0]; const file=resolve(cwd,a[1]);
    if(!exists(file)||isDir(file)) return `<span class="err">grep: ${escapeHtml(a[1])}: No such file</span>`;
    const lines=(FS[file].content||'').split('\n');
    const res=lines.filter(l=> ic? l.toLowerCase().includes(pat.toLowerCase()) : l.includes(pat));
    return res.map(l=>{
      const re=new RegExp('('+pat.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')',ic?'gi':'g');
      return escapeHtml(l).replace(re,'<span class="amber">$1</span>');
    }).join('\n');
  }
  function cmd_wc(args){
    const a=args.filter(x=>!x.startsWith('-'));
    if(!a.length) return `<span class="err">wc: missing file</span>`;
    const p=resolve(cwd,a[0]);
    if(!exists(p)||isDir(p)) return `<span class="err">wc: ${escapeHtml(a[0])}: No such file</span>`;
    const c=FS[p].content||''; const lines=c.split('\n').length-(c.endsWith('\n')?1:0);
    const words=c.trim()?c.trim().split(/\s+/).length:0;
    return `  ${lines}  ${words}  ${c.length} ${a[0]}`;
  }
  function cmd_headtail(args,which){
    const a=args.filter(x=>!x.startsWith('-'));
    let n=10;
    const ni=args.indexOf('-n'); if(ni>=0&&args[ni+1])n=parseInt(args[ni+1])||10;
    const short=args.find(x=>/^-\d+$/.test(x)); if(short)n=parseInt(short.slice(1))||10;
    const p=resolve(cwd,a[0]||'');
    if(!exists(p)||isDir(p)) return `<span class="err">${which}: cannot open '${escapeHtml(a[0]||'')}'</span>`;
    let lines=(FS[p].content||'').split('\n');
    if(lines.length && lines[lines.length-1]==='') lines=lines.slice(0,-1);
    const out= which==='head'? lines.slice(0,n) : lines.slice(-n);
    return escapeHtml(out.join('\n'));
  }
  function cmd_find(args){
    const root = args[0]&&!args[0].startsWith('-')?resolve(cwd,args[0]):cwd;
    const ni=args.indexOf('-name'); const pat=ni>=0?args[ni+1]:null;
    const res=[];
    (function walk(p){
      res.push(p);
      if(isDir(p)) for(const c of FS[p].children) walk(childPath(p,c));
    })(root);
    let list=res;
    if(pat){ const rx=new RegExp('^'+pat.replace(/\./g,'\\.').replace(/\*/g,'.*')+'$'); list=res.filter(p=>rx.test(baseOf(p))); }
    return list.map(p=>isDir(p)?`<span class="dir">${p}</span>`:p).join('\n');
  }
  function cmd_open(args, edit){
    const f=args.filter(a=>!a.startsWith('-'))[0];
    if(!f) return `<span class="err">open: missing file</span>`;
    const p=resolve(cwd,f);
    if(!exists(p)) return `<span class="err">open: ${escapeHtml(f)}: No such file or directory</span>`;
    if(isDir(p)){ openFiles(p); return `<span class="dim">opening ${escapeHtml(f)} in File Manager...</span>`; }
    openEditor(p); return `<span class="dim">opening ${escapeHtml(f)} in editor...</span>`;
  }

  function printHelp(){
    const cmds=[
      ['ls','list directory'],['cd','change directory'],['pwd','print working dir'],
      ['cat','print file'],['echo','print text (supports > and >>)'],['tree','directory tree'],
      ['mkdir','make directory'],['touch','create file'],['rm','remove (-r for dirs)'],
      ['cp / mv','copy / move'],['grep','search in file'],['find','find files'],
      ['head / tail','first / last lines'],['wc','count lines/words'],
      ['open / edit','open file in GUI app'],['neofetch','system info'],
      ['cowsay','a cow says things'],['figlet','ascii banner'],['history','command history'],
      ['clear','clear screen (⌃L)'],['reboot','restart NebulaOS'],['help','this message'],
    ];
    print('<span class="ok">NebulaOS shell — available commands:</span>\n');
    print(cmds.map(([c,d])=>`  <span class="exe">${c.padEnd(12)}</span><span class="dim">${d}</span>`).join('\n'));
    print(`\n<span class="dim">Tip: Tab completes paths · ↑/↓ history · files are shared with the File Manager</span>`);
  }
  function printNeofetch(){
    const logo = [
'        .  *  .   ',
'    *  .   _   . *',
'  .   *  /` `\\  . ',
'  *  .  | nbl | * ',
'   .  * \\___/  .  ',
'  *  .   |||  *  .',
].join('\n');
    const info = [
['nebula','@nebula'],
['────────────────',''],
['OS','NebulaOS 1.0 Stellar'],
['Kernel','web-6.0.1-nebula'],
['Shell','nsh 1.0'],
['DE','Stellar Desktop'],
['Terminal','nebula-term'],
['CPU','Browser Virtual @ ∞GHz'],
['Memory','421M / 8192M'],
['Uptime',uptime()],
    ];
    const logoLines=logo.split('\n');
    const rows=Math.max(logoLines.length, info.length);
    let out='';
    for(let i=0;i<rows;i++){
      const l=(logoLines[i]||'').padEnd(20);
      const r=info[i]?(info[i][1]?`<span class="cyan amber">${info[i][0]}</span><span class="dim">: </span>${info[i][1]}`:`<span class="amber">${info[i][0]}</span>`):'';
      out+=`<span class="ascii">${l}</span>${r}\n`;
    }
    print(out.replace(/\n$/,''));
  }

  // boot greeting
  print('<span class="dim">NebulaOS 1.0 "Stellar" · nsh shell · type </span><span class="exe">help</span><span class="dim"> to begin</span>');
  print(FS['/etc/motd'].content.trim().replace(/^/,'<span class="amber">')+'</span>');
  print('');
  newInput();
}

/* ===================================================================
   File Manager
   =================================================================== */
const openFMs = [];
function openFiles(startDir='/home/nebula'){
  const body=document.createElement('div'); body.className='fm';
  const win = makeWindow({title:'Files', icon:ICON.files, w:680, h:460, body, app:'files',
    onClose:()=>{ const i=openFMs.indexOf(api); if(i>=0)openFMs.splice(i,1); }});

  let cwd=startDir; const back=[], fwd=[];
  body.innerHTML=`
    <div class="fm-side">
      <div class="grp">Places</div>
      <div class="fm-place" data-go="/home/nebula"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg>Home</div>
      <div class="fm-place" data-go="/home/nebula/Documents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 4h10l2 3h4v13H4z"/></svg>Documents</div>
      <div class="fm-place" data-go="/home/nebula/Downloads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Downloads</div>
      <div class="fm-place" data-go="/home/nebula/Projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M8 9l-4 3 4 3M16 9l4 3-4 3"/></svg>Projects</div>
      <div class="grp">System</div>
      <div class="fm-place" data-go="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 010 18"/></svg>Root</div>
      <div class="fm-place" data-go="/etc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>etc</div>
    </div>
    <div class="fm-main">
      <div class="fm-bar">
        <button class="fm-nav back" title="Back">‹</button>
        <button class="fm-nav fwd" title="Forward">›</button>
        <button class="fm-nav up" title="Up">↑</button>
        <div class="fm-path"></div>
      </div>
      <div class="fm-grid"></div>
      <div class="fm-foot"></div>
    </div>`;

  const grid=body.querySelector('.fm-grid');
  const pathEl=body.querySelector('.fm-path');
  const foot=body.querySelector('.fm-foot');
  const bBack=body.querySelector('.back'), bFwd=body.querySelector('.fwd'), bUp=body.querySelector('.up');

  function render(){
    pathEl.textContent = cwd==='/home/nebula'?'~':cwd.replace('/home/nebula','~');
    grid.innerHTML='';
    body.querySelectorAll('.fm-place').forEach(p=>p.classList.toggle('active',p.dataset.go===cwd));
    bBack.disabled=back.length===0; bFwd.disabled=fwd.length===0; bUp.disabled=cwd==='/';
    const items=listDir(cwd);
    if(items.length===0){ grid.innerHTML='<div class="fm-empty">This folder is empty.<br><span style="opacity:.6">Right-click to create a file or folder.</span></div>'; }
    items.forEach(name=>{
      const p=childPath(cwd,name);
      const it=document.createElement('div'); it.className='fm-item'; it.dataset.path=p;
      it.innerHTML=`${iconFor(p)}<span>${escapeHtml(name)}</span>`;
      it.addEventListener('click',(e)=>{ e.stopPropagation(); grid.querySelectorAll('.fm-item').forEach(x=>x.classList.remove('sel')); it.classList.add('sel'); });
      it.addEventListener('dblclick',()=>{ if(isDir(p)) go(p); else openEditor(p); });
      it.addEventListener('contextmenu',(e)=>{ e.preventDefault(); e.stopPropagation(); itemMenu(e,p); });
      grid.appendChild(it);
    });
    const nDir=items.filter(n=>isDir(childPath(cwd,n))).length;
    foot.textContent=`${items.length} items · ${nDir} folders · ${items.length-nDir} files`;
  }
  function go(p,record=true){ if(record){back.push(cwd); fwd.length=0;} cwd=p; render(); }

  bBack.addEventListener('click',()=>{ if(back.length){ fwd.push(cwd); cwd=back.pop(); render(); } });
  bFwd.addEventListener('click',()=>{ if(fwd.length){ back.push(cwd); cwd=fwd.pop(); render(); } });
  bUp.addEventListener('click',()=>{ if(cwd!=='/') go(parentOf(cwd)); });
  body.querySelectorAll('.fm-place').forEach(p=>p.addEventListener('click',()=>go(p.dataset.go)));

  // empty-area context menu (new file/folder)
  grid.addEventListener('contextmenu',(e)=>{
    if(e.target.closest('.fm-item')) return;
    e.preventDefault();
    showCtx(e.clientX,e.clientY,[
      {label:'New Folder', icon:'folder', act:()=>{ const n=uniqueName(cwd,'New Folder',''); FS[childPath(cwd,n)]={type:'dir',children:[]}; addChild(cwd,n); refreshFileManagers(); }},
      {label:'New Text File', icon:'file', act:()=>{ const n=uniqueName(cwd,'untitled','.txt'); FS[childPath(cwd,n)]={type:'file',content:''}; addChild(cwd,n); refreshFileManagers(); }},
      {sep:true},
      {label:'Open in Terminal', icon:'term', act:()=>{ openTerminalAt(cwd); }},
      {label:'Refresh', icon:'refresh', act:()=>render()},
    ]);
  });
  grid.addEventListener('click',()=>grid.querySelectorAll('.fm-item').forEach(x=>x.classList.remove('sel')));

  function itemMenu(e,p){
    showCtx(e.clientX,e.clientY,[
      {label:isDir(p)?'Open':'Open in Editor', icon:isDir(p)?'folder':'file', act:()=>{ isDir(p)?go(p):openEditor(p); }},
      {label:'Rename', icon:'edit', act:()=>{ renameItem(p); }},
      {sep:true},
      {label:'Delete', icon:'trash', danger:true, act:()=>{ deleteRec(p); removeChild(parentOf(p),baseOf(p)); refreshFileManagers(); }},
    ]);
  }
  function renameItem(p){
    const cur=baseOf(p);
    const nn=prompt('Rename to:',cur);
    if(!nn||nn===cur) return;
    const np=childPath(parentOf(p),nn);
    if(exists(np)){ alert('A file with that name already exists.'); return; }
    FS[np]=FS[p]; if(isDir(p)){ /*rekey*/ (function rk(o,n){ for(const c of FS[n].children){ const oo=childPath(o,c),nn2=childPath(n,c); FS[nn2]=FS[oo]; delete FS[oo]; if(isDir(nn2))rk(oo,nn2);} })(p,np);} 
    delete FS[p]; removeChild(parentOf(p),cur); addChild(parentOf(p),nn);
    refreshFileManagers();
  }

  const api={refresh:()=>{ if(!exists(cwd)) cwd='/home/nebula'; render(); }, win};
  openFMs.push(api);
  render();
}
function refreshFileManagers(){ openFMs.forEach(f=>f.refresh()); renderDesktopIcons(); }

/* ===================================================================
   Text Editor
   =================================================================== */
function openEditor(path){
  const isNew = !path;
  const body=document.createElement('div'); body.className='ed';
  body.innerHTML=`
    <div class="ed-bar">
      <span class="win-ico" style="width:15px;height:15px">${ICON.editor}</span>
      <span class="ed-fname">${path?escapeHtml(baseOf(path)):'untitled.txt'}</span>
      <span class="dim" style="color:var(--txt-faint);font-size:11px" class="dirty"></span>
      <button class="ed-btn">Save</button>
    </div>
    <textarea class="ed-area focus-trap" spellcheck="false"></textarea>
    <div class="ed-status"><span class="pos">Ln 1, Col 1</span><span class="cnt"></span><span style="margin-left:auto" class="path">${path?escapeHtml(path):'(unsaved)'}</span></div>`;
  const ta=body.querySelector('.ed-area');
  ta.value = path && exists(path)&&!isDir(path) ? (FS[path].content||'') : '';
  const fname=body.querySelector('.ed-fname');
  const win = makeWindow({title:path?baseOf(path):'untitled.txt — Editor', icon:ICON.editor, w:560, h:440, body, app:'editor:'+(path||Math.random())});

  let curPath=path;
  const status=body.querySelector('.pos'), cnt=body.querySelector('.cnt');
  function updateStatus(){
    const v=ta.value; const upto=v.slice(0,ta.selectionStart);
    const ln=upto.split('\n').length; const col=upto.length-upto.lastIndexOf('\n');
    status.textContent=`Ln ${ln}, Col ${col}`;
    cnt.textContent=`${v.length} chars · ${v.split('\n').length} lines`;
  }
  ta.addEventListener('input',updateStatus);
  ta.addEventListener('keyup',updateStatus);
  ta.addEventListener('click',updateStatus);
  ta.addEventListener('keydown',(e)=>{
    if(e.key==='Tab'){ e.preventDefault(); const s=ta.selectionStart,en=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+'    '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+4; }
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); save(); }
  });
  updateStatus(); setTimeout(()=>ta.focus(),50);

  function save(){
    if(!curPath){
      const name=prompt('Save as (in ~):','untitled.txt');
      if(!name) return;
      curPath=childPath('/home/nebula',name);
      addChild('/home/nebula',name);
    }
    FS[curPath]={type:'file',content:ta.value, exe:FS[curPath]?FS[curPath].exe:false};
    fname.textContent=baseOf(curPath);
    win.el.querySelector('.win-title').textContent=baseOf(curPath);
    body.querySelector('.path').textContent=curPath;
    refreshFileManagers();
    const btn=body.querySelector('.ed-btn'); const t=btn.textContent; btn.textContent='Saved ✓';
    setTimeout(()=>btn.textContent=t,1000);
  }
  body.querySelector('.ed-btn').addEventListener('click',save);
}

function openCalc(){
  const body=document.createElement('div'); body.className='calc';
  body.innerHTML=`
    <div class="calc-disp"><div class="small"></div><div class="big">0</div></div>
    <div class="calc-grid">
      <button class="fn" data-k="C">C</button>
      <button class="fn" data-k="back">⌫</button>
      <button class="fn" data-k="%">%</button>
      <button class="op" data-k="/">÷</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button class="op" data-k="*">×</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button class="op" data-k="-">−</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button class="op" data-k="+">+</button>
      <button data-k="0" style="grid-column:span 2">0</button><button data-k=".">.</button><button class="eq" data-k="=">=</button>
    </div>`;
  makeWindow({title:'Calculator', icon:ICON.calc, w:280, h:380, body, app:'calc'});
  const big=body.querySelector('.big'), small=body.querySelector('.small');
  let expr='';
  function refresh(){ big.textContent = expr ? prettify(expr) : '0'; }
  function prettify(e){ return e.replace(/\*/g,'×').replace(/\//g,'÷').replace(/-/g,'−'); }
  body.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.k;
    if(k==='C'){ expr=''; small.textContent=''; }
    else if(k==='back'){ expr=expr.slice(0,-1); }
    else if(k==='='){ try{ const r=safeEval(expr); small.textContent=prettify(expr)+' ='; expr=String(r); }catch{ small.textContent='Error'; } }
    else if(k==='%'){ try{ expr=String(safeEval(expr)/100); }catch{} }
    else { if('+-*/.'.includes(k)&&!expr&&k!=='-') return; expr+=k; }
    refresh();
  }));
  document.addEventListener('keydown',function ck(e){
    if(!document.body.contains(body)){ document.removeEventListener('keydown',ck); return; }
    if(/[0-9+\-*/.]/.test(e.key)){ expr+=e.key; refresh(); }
    else if(e.key==='Enter'){ try{ const r=safeEval(expr); small.textContent=prettify(expr)+' ='; expr=String(r); refresh(); }catch{} }
    else if(e.key==='Backspace'){ expr=expr.slice(0,-1); refresh(); }
    else if(e.key==='Escape'){ expr=''; small.textContent=''; refresh(); }
  });
  refresh();
}

    return `<!doctype html><html><head><meta charset="utf-8"><style>
      body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;max-width:660px;margin:0 auto;padding:30px 28px;color:#1a2236;line-height:1.65;background:linear-gradient(180deg,#f6f9ff,#eef3fb);min-height:100vh}

  function navigate(u, record=true){
    u=u.trim();

    if(u.startsWith('nebula://search?')){
      const q=decodeURIComponent(u.split('=')[1]||'');
      inner=`<h1>Search</h1><p>You searched for <b>${escapeHtml(q)}</b>.</p><p style="color:#5a6b88">This browser is sandboxed and offline, so here's an honest result: there are 0 live pages, but your shell has the answer to almost anything — try <code>man ${escapeHtml(q.split(' ')[0]||'ls')}</code> or <code>help</code> in the Terminal.</p><p><a href="nebula://home">← Home</a></p>`;

    else { inner=`<h1>Page not found</h1><p><code>${escapeHtml(u)}</code> doesn't exist.</p><p><a href="nebula://home">← Home</a></p>`; }
    frame.srcdoc=pageHTML(inner);
  }
  // intercept link clicks inside iframe
  frame.addEventListener('load',()=>{
    try{ frame.contentDocument.querySelectorAll('a').forEach(a=>{
      a.addEventListener('click',(e)=>{ e.preventDefault(); navigate(a.getAttribute('href')); });
    });}catch(e){}
  });
  window.addEventListener('message',(e)=>{ if(e.data&&e.data.q!==undefined) navigate('nebula://search?q='+encodeURIComponent(e.data.q)); });
  url.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ let v=url.value; if(!v.includes('://')&&v.includes('.')) v='http://'+v; else if(!v.includes('://')) v='nebula://search?q='+encodeURIComponent(v); navigate(v); } });

  body.querySelector('[data-n=fwd]').addEventListener('click',()=>{ if(hi<hist.length-1){hi++; navigate(hist[hi],false);} });
  body.querySelector('[data-n=reload]').addEventListener('click',()=>navigate(url.value,false));
  navigate('nebula://home');
}

  const cpuC=body.querySelector('.g-cpu').getContext('2d'), memC=body.querySelector('.g-mem').getContext('2d');
  const plist=body.querySelector('.plist');
  const cpuH=Array(40).fill(5), memH=Array(40).fill(40);
  const procs=[['1','0.0','2.1','init'],['42','1.2','5.4','nebula-shell'],['108','0.4','3.2','stellar-wm'],['203','2.1','8.7','nebula-browser'],['256','0.1','1.4','clock-daemon']];
  function draw(ctx,arr,color,max){
    ctx.clearRect(0,0,200,46); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.beginPath();
    arr.forEach((v,i)=>{ const x=i/(arr.length-1)*200, y=46-(v/max)*44; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke(); ctx.lineTo(200,46); ctx.lineTo(0,46); ctx.closePath();
    ctx.fillStyle=color+'22'; ctx.fill();
  }
  const t=setInterval(()=>{
    if(!document.body.contains(body)){ clearInterval(t); return; }
    const c=Math.max(2,Math.min(96,cpuH[cpuH.length-1]+(Math.random()*30-15)));
    const m=Math.max(380,Math.min(900,memH[memH.length-1]*8+(Math.random()*120-60)))/8;
    cpuH.push(c); cpuH.shift(); memH.push(m); memH.shift();
    mcpu.textContent=Math.round(c)+'%'; mmem.textContent=Math.round(m*8)+'M';
    draw(cpuC,cpuH,getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim(),100);
    draw(memC,memH,'#e85aad',900/8);
    plist.innerHTML=procs.map(p=>`<div>${p[0].padEnd(6)}${(((Math.random()*3).toFixed(1))+'').padEnd(6)}${p[2].padEnd(6)}${p[3]}</div>`).join('');
  },900);
}

/* ===================================================================
   Helpers
   =================================================================== */
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stripTags(s){ const d=document.createElement('div'); d.innerHTML=s; return d.textContent; }
function tokenize(s){ const m=s.match(/"[^"]*"|'[^']*'|\S+/g)||[]; return m.map(t=>t); }
function writeFileTo(path, content, append){
  const par=parentOf(path);
  if(!isDir(par)) return;
  if(exists(path)&&isDir(path)) return;
  if(!exists(path)) addChild(par, baseOf(path));
  FS[path]={type:'file', content: append&&FS[path]?((FS[path].content||'')+content+'\n'):(content+'\n')};
}
function safeEval(expr){
  if(!/^[-+*/().\d\s%]+$/.test(expr)) throw new Error('bad');
  expr=expr.replace(/%/g,'/100');
  // eslint-disable-next-line no-new-func
  const r=Function('"use strict";return ('+expr+')')();
  if(typeof r!=='number'||!isFinite(r)) throw new Error('bad');
  return Math.round(r*1e10)/1e10;
}
function cowsay(text){
  const top=' '+'_'.repeat(text.length+2);
  const bot=' '+'-'.repeat(text.length+2);
  return `${top}\n< ${escapeHtml(text)} >\n${bot}\n        \\   ^__^\n         \\  (oo)\\_______\n            (__)\\       )\\/\\\n                ||----w |\n                ||     ||`;
}
function banner(text){
  // tiny block letters
  const F={A:['▄▀█','█▀█'],B:['█▄ ','█▄█'],E:['█▀▀','██▄'],L:['█  ','█▄▄'],N:['█▄ █','█ ▀█'],U:['█ █','█▄█'],
    S:['█▀▀','▄██'],O:['█▀█','█▄█'],R:['█▀█','█▀▄'],' ':['  ','  '],T:['▀█▀',' █ '],I:['█','█'],D:['█▀▄','█▄▀']};
  text=text.toUpperCase(); const r=['',''];
  for(const ch of text){ const g=F[ch]||['??','??']; r[0]+=g[0]+' '; r[1]+=g[1]+' '; }
  return r.join('\n');
}
const BOOT_T=Date.now();
function uptime(){
  const s=Math.floor((Date.now()-BOOT_T)/1000);
  const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60;
  return (h?h+'h ':'')+(m?m+'m ':'')+sec+'s';
}

document.addEventListener('keydown',(e)=>{
  if(document.getElementById('boot').style.display!=='none' && document.getElementById('desktop').style.display==='none') return;
  if(e.ctrlKey&&e.key==='t'&&!e.target.closest('input,textarea')){ e.preventDefault(); openTerminal(); }
  if(e.ctrlKey&&e.key==='r'){ e.preventDefault(); reboot(); }
});

/* ---------- starfield ---------- */
let starsOn=true;
function initStars(){
  const c=document.getElementById('stars'); const ctx=c.getContext('2d');
  function size(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  size(); window.addEventListener('resize',size);
  const stars=Array.from({length:120},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.2,t:Math.random()*Math.PI*2,s:Math.random()*.02+.005}));
  (function loop(){
    if(starsOn){
      ctx.clearRect(0,0,c.width,c.height);
      stars.forEach(st=>{ st.t+=st.s; const a=.3+Math.abs(Math.sin(st.t))*.6;
        ctx.fillStyle=`rgba(200,220,255,${a})`; ctx.beginPath(); ctx.arc(st.x*c.width,st.y*c.height,st.r,0,7); ctx.fill();
      });
    }
    requestAnimationFrame(loop);
  })();
}

/* ---------- clock ---------- */
function startClock(){
  const cl=document.getElementById('clock'), ds=document.getElementById('datestr');
  const cpu=document.getElementById('cpu'), mem=document.getElementById('mem');
  function tick(){
    const d=new Date();
    cl.textContent=d.toLocaleTimeString('en-US',{hour12:false});
    ds.textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    cpu.textContent=(2+Math.floor(Math.random()*6))+'%';
    mem.textContent=(400+Math.floor(Math.random()*60))+'M';
  }
  tick(); setInterval(tick,1000);
}

/* ===================================================================
   Boot sequence
   =================================================================== */
function reboot(){
  // tear down
  Object.keys(windows).forEach(id=>{ windows[id].el.remove(); delete windows[id]; });
  openFMs.length=0;
  document.getElementById('desktop').style.display='none';
  const boot=document.getElementById('boot');
  boot.style.display='flex'; boot.style.opacity='1';
  document.getElementById('boot-log').innerHTML='';
  document.getElementById('boot-bar').style.width='0';
  runBoot();
}
const BOOT_LINES=[
  ['Initializing NebulaOS bootloader',12],
  ['Loading kernel <span class="hl">web-6.0.1-nebula</span>',18],
  ['Mounting virtual filesystem <span class="hl">nebula-vfs</span>',30],
  ['Starting device manager',42],
  ['  tty0 ........................ <span class="ok">ok</span>',52],
  ['  display @ '+window.innerWidth+'x'+window.innerHeight+' ......... <span class="ok">ok</span>',60],
  ['Loading Stellar window manager',72],
  ['Mounting <span class="hl">/home/nebula</span>',82],
  ['Starting user session for <span class="hl">nebula</span>',92],
  ['Launching desktop environment',100],
];
function runBoot(){
  const log=document.getElementById('boot-log'), bar=document.getElementById('boot-bar');
  let i=0;
  function step(){
    if(i>=BOOT_LINES.length){
      setTimeout(()=>{
        const boot=document.getElementById('boot'); boot.style.opacity='0';
        setTimeout(()=>{ boot.style.display='none'; launchDesktop(); },600);
      },350);
      return;
    }
    const [txt,pct]=BOOT_LINES[i];
    const d=document.createElement('div'); d.innerHTML=(txt.startsWith('  ')?'':'<span class="ok">[ '+(i+1)+' ]</span> ')+txt;
    log.appendChild(d); bar.style.width=pct+'%';
    i++;
    setTimeout(step, 130+Math.random()*120);
  }
  step();
}
let desktopLaunched=false;
function launchDesktop(){
  document.getElementById('desktop').style.display='flex';
  if(!desktopLaunched){
    desktopLaunched=true;
    initStars(); startClock(); buildDock(); renderDesktopIcons(); wireMenus();
  } else { buildDock(); renderDesktopIcons(); }
  // open a welcome terminal
  setTimeout(()=>openTerminal(),250);
}

// go
runBoot();
