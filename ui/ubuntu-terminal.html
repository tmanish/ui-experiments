<script>
"use strict";
/* =====================================================================
   Ubuntu 22.04 — GNOME Terminal (bash), single file
   ===================================================================== */

/* ---------------- Virtual filesystem ---------------- */
const HOME='/home/user';
const FS={
 '/':{t:'d',c:['bin','boot','dev','etc','home','lib','media','opt','proc','root','run','sbin','srv','tmp','usr','var']},
 '/home':{t:'d',c:['user']},
 [HOME]:{t:'d',c:['Desktop','Documents','Downloads','Music','Pictures','Videos','Projects','snap','.bashrc','.profile','README.md']},
 [HOME+'/Desktop']:{t:'d',c:[]},
 [HOME+'/Documents']:{t:'d',c:['notes.txt','resume.md','budget.csv']},
 [HOME+'/Documents/notes.txt']:{t:'f',data:'Ubuntu terminal notes\n=====================\n\n- This is a faithful bash shell on the iconic aubergine background.\n- Files you create with touch/mkdir/echo are real (in memory).\n- Try: neofetch, sudo apt install cowsay, htop, man ls, tree\n'},
 [HOME+'/Documents/resume.md']:{t:'f',data:'# Resume\n\nName:     User\nRole:     Software Developer\nLocation: ~/  (Ubuntu 22.04 LTS)\nSkills:   bash, python3, git\n'},
 [HOME+'/Documents/budget.csv']:{t:'f',data:'month,income,spend\nJan,5200,3100\nFeb,5200,2950\nMar,5400,3300\nApr,5400,3050\n'},
 [HOME+'/Downloads']:{t:'d',c:['ubuntu-22.04.3-desktop-amd64.iso']},
 [HOME+'/Downloads/ubuntu-22.04.3-desktop-amd64.iso']:{t:'f',data:'(disk image)',size:4915011584},
 [HOME+'/Music']:{t:'d',c:[]},
 [HOME+'/Pictures']:{t:'d',c:['wallpaper.png','screenshot.png']},
 [HOME+'/Pictures/wallpaper.png']:{t:'f',data:'(image)'},
 [HOME+'/Pictures/screenshot.png']:{t:'f',data:'(image)'},
 [HOME+'/Videos']:{t:'d',c:[]},
 [HOME+'/Projects']:{t:'d',c:['hello.py','kernel.rs','app']},
 [HOME+'/Projects/hello.py']:{t:'f',data:'#!/usr/bin/env python3\nprint("Hello from Ubuntu")\n'},
 [HOME+'/Projects/kernel.rs']:{t:'f',data:'fn main() {\n    println!("booting...");\n}\n'},
 [HOME+'/Projects/app']:{t:'d',c:['index.js']},
 [HOME+'/Projects/app/index.js']:{t:'f',data:'console.log("ubuntu node app");\n'},
 [HOME+'/snap']:{t:'d',c:[]},
 [HOME+'/.bashrc']:{t:'f',data:'# ~/.bashrc\nexport PS1="\\u@\\h:\\w$ "\nalias ll="ls -alF"\nalias la="ls -A"\nalias l="ls -CF"\n'},
 [HOME+'/.profile']:{t:'f',data:'# ~/.profile\n'},
 [HOME+'/README.md']:{t:'f',data:'Welcome to Ubuntu 22.04 LTS (Jammy Jellyfish).\nOpen secret: type `neofetch`.\n'},
 '/etc':{t:'d',c:['os-release','hostname','hosts','passwd','lsb-release']},
 '/etc/os-release':{t:'f',data:'PRETTY_NAME="Ubuntu 22.04.3 LTS"\nNAME="Ubuntu"\nVERSION_ID="22.04"\nVERSION="22.04.3 LTS (Jammy Jellyfish)"\nVERSION_CODENAME=jammy\nID=ubuntu\nID_LIKE=debian\nHOME_URL="https://www.ubuntu.com/"\nUBUNTU_CODENAME=jammy\n'},
 '/etc/lsb-release':{t:'f',data:'DISTRIB_ID=Ubuntu\nDISTRIB_RELEASE=22.04\nDISTRIB_CODENAME=jammy\nDISTRIB_DESCRIPTION="Ubuntu 22.04.3 LTS"\n'},
 '/etc/hostname':{t:'f',data:'ubuntu\n'},
 '/etc/hosts':{t:'f',data:'127.0.0.1\tlocalhost\n127.0.1.1\tubuntu\n'},
 '/etc/passwd':{t:'f',data:'root:x:0:0:root:/root:/bin/bash\nuser:x:1000:1000:User:/home/user:/bin/bash\n'},
 '/root':{t:'d',c:[]},'/tmp':{t:'d',c:[]},
 '/var':{t:'d',c:['log']},'/var/log':{t:'d',c:['syslog']},
 '/var/log/syslog':{t:'f',data:'systemd[1]: Started Ubuntu desktop session.\n'},
 '/usr':{t:'d',c:['bin','lib','share']},'/usr/bin':{t:'d',c:[]},'/usr/lib':{t:'d',c:[]},'/usr/share':{t:'d',c:[]},
 '/bin':{t:'d',c:[]},'/boot':{t:'d',c:[]},'/dev':{t:'d',c:[]},'/lib':{t:'d',c:[]},'/media':{t:'d',c:[]},'/opt':{t:'d',c:[]},
 '/proc':{t:'d',c:['cpuinfo','meminfo','version']},
 '/proc/cpuinfo':{t:'f',data:'processor\t: 0\nvendor_id\t: GenuineIntel\nmodel name\t: Intel(R) Core(TM) i7-1165G7 @ 2.80GHz\ncpu MHz\t\t: 2803.000\ncache size\t: 12288 KB\nprocessor\t: 1\nmodel name\t: Intel(R) Core(TM) i7-1165G7 @ 2.80GHz\n'},
 '/proc/meminfo':{t:'f',data:'MemTotal:        8039244 kB\nMemFree:         3127880 kB\nMemAvailable:    5204120 kB\n'},
 '/proc/version':{t:'f',data:'Linux version 6.5.0-14-generic (buildd@lcy02) (gcc 11.4.0) #14~22.04.1-Ubuntu SMP\n'},
 '/run':{t:'d',c:[]},'/sbin':{t:'d',c:[]},'/srv':{t:'d',c:[]},
};
const PKGS=new Set(['bash','coreutils','python3','nodejs','git','vim','curl','wget','nano','grep','sed','gawk','tree','htop']);

function norm(p){const s=[];for(const part of (p||'').split('/')){if(part===''||part==='.')continue;if(part==='..')s.pop();else s.push(part);}return '/'+s.join('/');}
function rsv(cwd,a){if(!a)return cwd;if(a==='~'||a.startsWith('~/'))a=HOME+a.slice(1);if(a.startsWith('/'))return norm(a);return norm(cwd+'/'+a);}
function ex(p){return FS[p]!==undefined;}
function isd(p){return FS[p]&&FS[p].t==='d';}
function par(p){if(p==='/')return '/';const i=p.lastIndexOf('/');return i===0?'/':p.slice(0,i);}
function base(p){if(p==='/')return '/';return p.slice(p.lastIndexOf('/')+1);}
function cp(d,n){return d==='/'?'/'+n:d+'/'+n;}
function lsArr(p){if(!isd(p))return[];return FS[p].c.slice().sort((a,b)=>{const A=isd(cp(p,a)),B=isd(cp(p,b));if(A!==B)return A?-1:1;return a.localeCompare(b);});}
function addc(d,n){if(FS[d]&&!FS[d].c.includes(n))FS[d].c.push(n);}
function rmc(d,n){if(FS[d])FS[d].c=FS[d].c.filter(x=>x!==n);}
function del(p){if(isd(p))for(const c of FS[p].c.slice())del(cp(p,c));delete FS[p];}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function strip(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent;}
function tok(s){return (s.match(/"[^"]*"|'[^']*'|\S+/g)||[]);}

const BOOT_T=Date.now();
function upStr(){const s=Math.floor((Date.now()-BOOT_T)/1000)+ 7140;const h=Math.floor(s/3600),m=Math.floor(s%3600/60);return (h?h+' hour'+(h>1?'s':'')+', ':'')+m+' min'+(m!==1?'s':'');}

/* ---------------- Ubuntu neofetch logo ---------------- */
const UBU=[
"            .-/+oossssoo+/-.",
"        \`:+ssssssssssssssssss+:\`",
"      -+ssssssssssssssssssyyssss+-",
"    .ossssssssssssssssssdMMMNysssso.",
"   /ssssssssssshdmmNNmmyNMMMMhssssss/",
"  +ssssssssshmydMMMMMMMNddddyssssssss+",
" /sssssssshNMMMyhhyyyyhmNMMMNhssssssss/",
".ssssssssdMMMNhsssssssssshNMMMdssssssss.",
"+sssshhhyNMMNyssssssssssssyNMMMysssssss+",
"ossyNMMMNyMMhsssssssssssssshmmmhssssssso",
"ossyNMMMNyMMhsssssssssssssshmmmhssssssso",
"+sssshhhyNMMNyssssssssssssyNMMMysssssss+",
".ssssssssdMMMNhsssssssssshNMMMdssssssss.",
" /sssssssshNMMMyhhyyyyhdNMMMNhssssssss/",
"  +sssssssssdmydMMMMMMMMddddyssssssss+",
"   /ssssssssssshdmNNNNmyNMMMMhssssss/",
"    .ossssssssssssssssssdMMMNysssso.",
"      -+sssssssssssssssssyyyssss+-",
"        \`:+ssssssssssssssssss+:\`",
"            .-/+oossssoo+/-."];

/* =====================================================================
   Terminal
   ===================================================================== */
const term=document.getElementById('term');
const titleEl=document.getElementById('title');
let cwd=HOME;
let busy=false;
const hist=[];let hi=0;
let activeIn=null;

const promptHTML=()=>`<span class="g">user@ubuntu</span><span class="wht">:</span><span class="b">${cwd===HOME?'~':cwd.replace(HOME,'~')}</span><span class="wht">$</span> `;
function setTitle(){titleEl.textContent=`user@ubuntu: ${cwd===HOME?'~':cwd.replace(HOME,'~')}`;}

function print(html,cls){const d=document.createElement('div');d.className='line'+(cls?' '+cls:'');d.innerHTML=html;term.appendChild(d);term.scrollTop=term.scrollHeight;return d;}
function clearT(){term.innerHTML='';}

function newInput(){
 if(busy)return;
 const line=document.createElement('div');line.className='term-il';
 line.innerHTML=`<span>${promptHTML()}</span>`;
 const inp=document.createElement('input');inp.className='term-in';inp.spellcheck=false;inp.autocapitalize='off';inp.autocomplete='off';inp.setAttribute('autocorrect','off');
 line.appendChild(inp);term.appendChild(line);activeIn=inp;inp.focus();term.scrollTop=term.scrollHeight;
 requestAnimationFrame(()=>{if(activeIn===inp&&!inp.disabled)inp.focus();});
 inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
   e.preventDefault();const cmd=inp.value;inp.disabled=true;activeIn=null;
   line.innerHTML=`<span>${promptHTML()}</span><span class="wht">${esc(cmd)}</span>`;
   if(cmd.trim()){hist.push(cmd);hi=hist.length;}
   runLine(cmd);
  }else if(e.key==='ArrowUp'){e.preventDefault();if(hi>0){hi--;inp.value=hist[hi]||'';moveCaretEnd(inp);}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(hi<hist.length-1){hi++;inp.value=hist[hi]||'';}else{hi=hist.length;inp.value='';}moveCaretEnd(inp);}
  else if(e.key==='Tab'){e.preventDefault();tabComplete(inp);}
  else if(e.ctrlKey&&(e.key==='l'||e.key==='L')){e.preventDefault();clearT();finish();}
  else if(e.ctrlKey&&(e.key==='c'||e.key==='C')){e.preventDefault();line.innerHTML=`<span>${promptHTML()}</span><span class="wht">${esc(inp.value)}</span>^C`;inp.disabled=true;activeIn=null;finish();}
  else if(e.ctrlKey&&(e.key==='d'||e.key==='D')){if(inp.value==='')return;}
 });
}
function moveCaretEnd(inp){setTimeout(()=>{try{inp.selectionStart=inp.selectionEnd=inp.value.length;}catch(e){}},0);}
function finish(){if(!busy)newInput();}
term.addEventListener('mousedown',()=>{if(activeIn&&!activeIn.disabled)setTimeout(()=>activeIn.focus(),0);});

function tabComplete(inp){
 const v=inp.value;const parts=v.split(' ');const frag=parts[parts.length-1];
 const sl=frag.lastIndexOf('/');const dir=sl>=0?rsv(cwd,frag.slice(0,sl+1)):cwd;const stub=sl>=0?frag.slice(sl+1):frag;
 if(!isd(dir))return;const m=FS[dir].c.filter(c=>c.startsWith(stub));
 if(m.length===1){parts[parts.length-1]=(sl>=0?frag.slice(0,sl+1):'')+m[0]+(isd(cp(dir,m[0]))?'/':'');inp.value=parts.join(' ');}
 else if(m.length>1){print(`<span>${promptHTML()}</span>${esc(v)}`);print(m.map(x=>isd(cp(dir,x))?`<span class="dir">${x}/</span>`:x).join('  '));}
}

const ASYNC=Symbol('async');
function runLine(raw){
 const line=raw.trim();if(!line){finish();return;}
 let redir=null,append=false,cl=line;
 const rr=line.match(/^(.*?)(>>|>)\s*(\S+)\s*$/);
 if(rr){cl=rr[1].trim();append=rr[2]==='>>';redir=rsv(cwd,rr[3]);}
 let pipeGrep=null;const pg=cl.match(/^(.*?)\|\s*grep\s+(.+)$/);
 if(pg){cl=pg[1].trim();pipeGrep=pg[2].replace(/^["']|["']$/g,'');}
 const args=tok(cl);let cmd=args.shift();
 let sudo=false;if(cmd==='sudo'){sudo=true;cmd=args.shift();if(cmd==='su'){print('<span class="gry">root shell not available in this demo.</span>');finish();return;}}
 let out;
 try{out=dispatch(cmd,args,sudo);}
 catch(err){out=`<span class="red">bash: internal error: ${esc(err&&err.message||err)}</span>`;}
 if(out===ASYNC)return;
 if(pipeGrep&&typeof out==='string'){
  const lines=strip(out).split('\n').filter(l=>l.includes(pipeGrep));
  out=lines.map(l=>esc(l).replace(new RegExp(esc(pipeGrep).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),`<span class="red">${esc(pipeGrep)}</span>`)).join('\n');
 }
 if(redir&&out!==undefined){writeTo(redir,strip(out),append);}
 else if(out)print(out);
 finish();
}
function writeTo(p,content,append){const d=par(p);if(!isd(d))return;if(ex(p)&&isd(p))return;if(!ex(p))addc(d,base(p));FS[p]={t:'f',data:append&&FS[p]?((FS[p].data||'')+content+'\n'):(content+'\n')};}

/* ---------------- command dispatch ---------------- */
function dispatch(cmd,a,sudo){
 switch(cmd){
  case undefined: case '': return '';
  case 'help': return helpText();
  case 'clear': clearT(); return '';
  case 'pwd': return cwd;
  case 'whoami': return sudo?'root':'user';
  case 'id': return 'uid=1000(user) gid=1000(user) groups=1000(user),4(adm),27(sudo),100(users)';
  case 'hostname': return 'ubuntu';
  case 'uname': return a.includes('-a')?'Linux ubuntu 6.5.0-14-generic #14~22.04.1-Ubuntu SMP PREEMPT_DYNAMIC x86_64 x86_64 x86_64 GNU/Linux':(a.includes('-r')?'6.5.0-14-generic':(a.includes('-m')?'x86_64':'Linux'));
  case 'lsb_release': return 'Distributor ID:\tUbuntu\nDescription:\tUbuntu 22.04.3 LTS\nRelease:\t22.04\nCodename:\tjammy';
  case 'date': return new Date().toString();
  case 'cal': return calText();
  case 'uptime': return ` ${new Date().toLocaleTimeString('en-GB')} up ${upStr()},  1 user,  load average: 0.42, 0.31, 0.28`;
  case 'echo': return echoCmd(a);
  case 'printf': return esc(a.join(' ').replace(/^["']|["']$/g,'').replace(/\\n/g,'\n').replace(/\\t/g,'\t'));
  case 'cat': return catCmd(a);
  case 'ls': case 'dir': return lsCmd(a);
  case 'll': return lsCmd(['-alF',...a]);
  case 'cd': {const r=cdCmd(a[0]);setTitle();return r||'';}
  case 'mkdir': return mkdirCmd(a);
  case 'touch': return touchCmd(a);
  case 'rm': return rmCmd(a,sudo);
  case 'rmdir': return rmCmd(['-r',...a],sudo);
  case 'cp': return cpCmd(a);
  case 'mv': return mvCmd(a);
  case 'tree': return treeCmd(a[0]?rsv(cwd,a[0]):cwd);
  case 'grep': return grepCmd(a);
  case 'find': return findCmd(a);
  case 'head': return htCmd(a,'head');
  case 'tail': return htCmd(a,'tail');
  case 'wc': return wcCmd(a);
  case 'sort': return sortCmd(a);
  case 'uniq': return uniqCmd(a);
  case 'which': return whichCmd(a);
  case 'whereis': return (a[0]||'')+': /usr/bin/'+(a[0]||'');

function cdCmd(arg){if(!arg||arg==='~'){cwd=HOME;return;}if(arg==='-'){return;}const t=rsv(cwd,arg);if(!ex(t))return `<span class="red">bash: cd: ${esc(arg)}: No such file or directory</span>`;if(!isd(t))return `<span class="red">bash: cd: ${esc(arg)}: Not a directory</span>`;cwd=t;}

function lsCmd(a){
 const flags=a.filter(x=>x.startsWith('-')).join('');
 const long=/[la]/.test(flags)&&flags.includes('l');
 const all=flags.includes('a')||flags.includes('A');
 const tgt=a.filter(x=>!x.startsWith('-'))[0];
 const dir=tgt?rsv(cwd,tgt):cwd;
 if(!ex(dir))return `<span class="red">ls: cannot access '${esc(tgt)}': No such file or directory</span>`;
 if(!isd(dir))return decorate(dir,base(dir));
 let it=FS[dir].c.slice();if(!all)it=it.filter(c=>!c.startsWith('.'));it.sort();
 if(all)it=['.','..'].concat(it);
 if(!it.length)return '';
 if(long){
  const rows=it.map(c=>{
   if(c==='.'||c==='..')return `drwxr-xr-x  2 user user  4096 Jan 15 09:00 <span class="dir">${c}</span>`;
   const p=cp(dir,c);const d=isd(p);
   const perm=d?'drwxr-xr-x':(/\.(sh|py|rs)$/.test(c)?'-rwxr-xr-x':'-rw-r--r--');
   const sz=d?4096:(FS[p].size||(FS[p].data?FS[p].data.length:0));
   return `${perm}  ${d?2:1} user user ${String(sz).padStart(8)} Jan 15 09:00 ${decorate(p,c)}`;
  });
  return `total ${Math.max(4,it.length*4)}\n`+rows.join('\n');
 }
 return it.map(c=>(c==='.'||c==='..')?`<span class="dir">${c}</span>`:decorate(cp(dir,c),c)).join('  ');
}
function decorate(p,name){if(isd(p))return `<span class="dir">${name}</span>`;if(/\.(sh|py|rs|js|out)$/.test(name))return `<span class="exe">${name}</span>`;if(/\.(png|jpg|jpeg|gif|svg|webp|bmp)$/.test(name))return `<span class="img">${name}</span>`;if(/\.(iso|img|zip|tar|gz|deb)$/.test(name))return `<span class="arc">${name}</span>`;return name;}

function catCmd(a){const f=a.filter(x=>!x.startsWith('-'));if(!f.length)return '';return f.map(x=>{const p=rsv(cwd,x);if(!ex(p))return `<span class="red">cat: ${esc(x)}: No such file or directory</span>`;if(isd(p))return `<span class="red">cat: ${esc(x)}: Is a directory</span>`;return esc(FS[p].data||'');}).join('\n');}

function echoCmd(a){let s=a.join(' ');const dashE=a[0]==='-e';if(dashE){s=a.slice(1).join(' ');}s=s.replace(/^["']|["']$/g,'').replace(/\$USER/g,'user').replace(/\$HOME/g,HOME).replace(/\$HOSTNAME/g,'ubuntu').replace(/\$SHELL/g,'/bin/bash').replace(/\$PWD/g,cwd).replace(/\$\(whoami\)/g,'user').replace(/\$\(hostname\)/g,'ubuntu').replace(/\$\?/g,'0');if(dashE)s=s.replace(/\\n/g,'\n').replace(/\\t/g,'\t');return esc(s);}

function mkdirCmd(a){const ns=a.filter(x=>!x.startsWith('-'));if(!ns.length)return `<span class="red">mkdir: missing operand</span>`;let e='';for(const n of ns){const p=rsv(cwd,n);if(ex(p)){e+=`<span class="red">mkdir: cannot create directory '${esc(n)}': File exists</span>\n`;continue;}if(!isd(par(p))){e+=`<span class="red">mkdir: cannot create directory '${esc(n)}': No such file or directory</span>\n`;continue;}FS[p]={t:'d',c:[]};addc(par(p),base(p));}return e.trim();}

function touchCmd(a){const ns=a.filter(x=>!x.startsWith('-'));if(!ns.length)return `<span class="red">touch: missing file operand</span>`;for(const n of ns){const p=rsv(cwd,n);if(!isd(par(p)))return `<span class="red">touch: cannot touch '${esc(n)}': No such file or directory</span>`;if(!ex(p)){FS[p]={t:'f',data:''};addc(par(p),base(p));}}return '';}

function rmCmd(a,sudo){const flags=a.filter(x=>x.startsWith('-')).join('');const rec=flags.includes('r')||flags.includes('R');const ns=a.filter(x=>!x.startsWith('-'));if(!ns.length)return `<span class="red">rm: missing operand</span>`;let e='';for(const n of ns){const p=rsv(cwd,n);if(p==='/'){return `<span class="red">rm: it is dangerous to operate recursively on '/'</span>\n<span class="red">rm: use --no-preserve-root to override this failsafe</span>`;}if(!ex(p)){e+=`<span class="red">rm: cannot remove '${esc(n)}': No such file or directory</span>\n`;continue;}if(['/','/home',HOME,'/etc','/usr','/bin'].includes(p)){e+=`<span class="red">rm: cannot remove '${esc(n)}': Permission denied</span>\n`;continue;}if(isd(p)&&!rec){e+=`<span class="red">rm: cannot remove '${esc(n)}': Is a directory</span>\n`;continue;}del(p);rmc(par(p),base(p));}return e.trim();}

function cpCmd(a){const x=a.filter(v=>!v.startsWith('-'));if(x.length<2)return `<span class="red">cp: missing destination file operand after '${esc(x[0]||'')}'</span>`;const s=rsv(cwd,x[0]);let d=rsv(cwd,x[1]);if(!ex(s))return `<span class="red">cp: cannot stat '${esc(x[0])}': No such file or directory</span>`;if(isd(s))return `<span class="red">cp: -r not specified; omitting directory '${esc(x[0])}'</span>`;if(isd(d))d=cp(d,base(s));FS[d]={t:'f',data:FS[s].data};addc(par(d),base(d));return '';}

function mvCmd(a){const x=a.filter(v=>!v.startsWith('-'));if(x.length<2)return `<span class="red">mv: missing destination file operand after '${esc(x[0]||'')}'</span>`;const s=rsv(cwd,x[0]);let d=rsv(cwd,x[1]);if(!ex(s))return `<span class="red">mv: cannot stat '${esc(x[0])}': No such file or directory</span>`;if(isd(d))d=cp(d,base(s));FS[d]=FS[s];if(isd(s))rekey(s,d);delete FS[s];rmc(par(s),base(s));addc(par(d),base(d));return '';}
function rekey(o,n){if(!isd(n))return;for(const c of FS[n].c){const oo=cp(o,c),nn=cp(n,c);FS[nn]=FS[oo];delete FS[oo];if(isd(nn))rekey(oo,nn);}}

function treeCmd(root){if(!ex(root))return `<span class="red">${esc(root)}  [error opening dir]</span>`;let dirs=0,files=0;function walk(p,pre){let s='';const ch=lsArr(p);ch.forEach((c,i)=>{const last=i===ch.length-1;const pp=cp(p,c);const d=isd(pp);if(d)dirs++;else files++;s+=pre+(last?'└── ':'├── ')+decorate(pp,c)+'\n';if(d)s+=walk(pp,pre+(last?'    ':'│   '));});return s;}return `<span class="dir">${root===HOME?'.':root}</span>\n`+walk(root,'')+`\n${dirs} ${dirs===1?'directory':'directories'}, ${files} ${files===1?'file':'files'}`;}

function grepCmd(a){const flags=a.filter(x=>x.startsWith('-')).join('');const x=a.filter(v=>!v.startsWith('-'));const ic=flags.includes('i');if(x.length<2)return `<span class="red">Usage: grep [OPTION]... PATTERN [FILE]...</span>`;const pat=x[0];const p=rsv(cwd,x[1]);if(!ex(p))return `<span class="red">grep: ${esc(x[1])}: No such file or directory</span>`;if(isd(p))return `<span class="red">grep: ${esc(x[1])}: Is a directory</span>`;const lines=(FS[p].data||'').split('\n');const re=new RegExp('('+pat.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')',ic?'gi':'g');const out=lines.filter(l=>ic?l.toLowerCase().includes(pat.toLowerCase()):l.includes(pat));return out.map(l=>esc(l).replace(re,'<span class="red">$1</span>')).join('\n');}

function findCmd(a){const root=a[0]&&!a[0].startsWith('-')?rsv(cwd,a[0]):cwd;const ni=a.indexOf('-name');const pat=ni>=0&&a[ni+1]?a[ni+1].replace(/['"]/g,''):null;if(!ex(root))return `<span class="red">find: '${esc(a[0])}': No such file or directory</span>`;const res=[];(function w(p){res.push(p);if(isd(p))for(const c of FS[p].c)w(cp(p,c));})(root);let l=res;if(pat){const rx=new RegExp('^'+pat.replace(/[.+^${}()|[\]\\]/g,'\\$&').replace(/\*/g,'.*').replace(/\?/g,'.')+'$');l=res.filter(p=>rx.test(base(p)));}return l.map(p=>isd(p)?`<span class="dir">${p}</span>`:p).join('\n');}

function htCmd(a,which){const x=a.filter(v=>!v.startsWith('-'));let n=10;const ni=a.indexOf('-n');if(ni>=0&&a[ni+1])n=parseInt(a[ni+1])||10;const sh=a.find(v=>/^-\d+$/.test(v));if(sh)n=parseInt(sh.slice(1));const p=rsv(cwd,x[0]||'');if(!ex(p))return `<span class="red">${which}: cannot open '${esc(x[0]||'')}' for reading: No such file or directory</span>`;if(isd(p))return `<span class="red">${which}: error reading '${esc(x[0])}': Is a directory</span>`;let ln=(FS[p].data||'').split('\n');if(ln.length&&ln[ln.length-1]==='')ln=ln.slice(0,-1);return esc((which==='head'?ln.slice(0,n):ln.slice(-n)).join('\n'));}

function wcCmd(a){const flags=a.filter(x=>x.startsWith('-')).join('');const x=a.filter(v=>!v.startsWith('-'));if(!x.length)return `<span class="red">wc: missing file operand</span>`;const p=rsv(cwd,x[0]);if(!ex(p))return `<span class="red">wc: ${esc(x[0])}: No such file or directory</span>`;if(isd(p))return `<span class="red">wc: ${esc(x[0])}: Is a directory</span>`;const c=FS[p].data||'';const lines=c?c.split('\n').length-(c.endsWith('\n')?1:0):0;const words=c.trim()?c.trim().split(/\s+/).length:0;if(flags.includes('l'))return `${lines} ${x[0]}`;if(flags.includes('w'))return `${words} ${x[0]}`;if(flags.includes('c'))return `${c.length} ${x[0]}`;return `${String(lines).padStart(7)} ${String(words).padStart(7)} ${String(c.length).padStart(7)} ${x[0]}`;}

function sortCmd(a){const flags=a.filter(x=>x.startsWith('-')).join('');const x=a.filter(v=>!v.startsWith('-'));const p=rsv(cwd,x[0]||'');if(!ex(p)||isd(p))return `<span class="red">sort: cannot read: ${esc(x[0]||'')}: No such file or directory</span>`;let ln=(FS[p].data||'').split('\n').filter(l=>l!=='');if(flags.includes('n'))ln.sort((a,b)=>parseFloat(a)-parseFloat(b));else ln.sort();if(flags.includes('r'))ln.reverse();return esc(ln.join('\n'));}
